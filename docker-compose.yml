version: '3.8'

services:
  frontend:
    build: ./client
    ports:
      - "3000:80"
    restart: always

  backend:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: always

  # If you need a database instead of using local XAMPP MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: laundry_db
      MYSQL_ROOT_PASSWORD: your_password